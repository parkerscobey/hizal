services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: winnow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: winnow
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d winnow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
